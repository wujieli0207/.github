name: Deploy

on:
  workflow_call:
    inputs:
      platform:
        description: "Deploy platform: cloudflare or vercel"
        required: true
        type: string
      deploy_command:
        description: "Custom deploy command (overrides platform default)"
        required: false
        type: string
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      pnpm_version:
        description: "pnpm version"
        required: false
        type: string
        default: "latest"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare
        if: inputs.platform == 'cloudflare'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ${{ inputs.deploy_command || 'pnpm cf:deploy' }}

      - name: Deploy to Vercel
        if: inputs.platform == 'vercel'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: ${{ inputs.deploy_command || 'npx vercel --prod --token=$VERCEL_TOKEN' }}
